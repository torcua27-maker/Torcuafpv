# Sitio estático (un solo index.html). Sin build.
[build]
  publish = "."

# Cabeceras de seguridad para todo el sitio
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caché larga para imágenes (tienen hash de contenido implícito por nombre)
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.JPG"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
